<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corrective RAG Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="chat-container">
        <header>
            <div class="logo">
                <span class="icon">🤖</span>
                <h1>CRAG Assistant</h1>
            </div>
            <div class="status-badge">Online</div>
        </header>
        
        <div id="chat-box" class="chat-box">
            <!-- Messages will be injected here -->
            <div class="message system-message">
                Hello! I am your Corrective RAG Assistant. How can I help you today?
            </div>
        </div>

        <form id="chat-form" class="input-area">
            <input type="text" id="user-input" placeholder="Ask me anything..." autocomplete="off">
            <button type="submit" id="send-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22 2L2 22M22 2L12 12M22 2L2 22" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" transform="rotate(-45 12 12)"/>
                    <path d="M2 22L12 12L22 22" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M12 12L22 2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span>Send</span>
            </button>
        </form>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
